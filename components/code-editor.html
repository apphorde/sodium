<template shadow-dom="open" component="code-editor">
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/default.min.css"
  />
  <div class="flex flex-col expand">
    <div class="flex editor-container">
      <div class="monospace line-numbers" ref="lines"></div>
      <div class="editor-area expand">
        <div class="layer preview monospace" ref="preview"></div>
        <textarea
          autocorrect="off"
          autocapitalize="off"
          autocomplete="off"
          spellcheck="false"
          bind-name="name"
          bind-value="valueProp"
          on-input.stop="onSourceChange()"
          on-change.stop="onSourceChange()"
          on-keydown="onKeyEvent($event)"
          on-keyup="updatePosition()"
          on-select="updatePosition()"
          on-scroll="syncScroll($event)"
          class="layer source monospace"
          ref="sourceRef"
        ></textarea>
      </div>
    </div>
    <div class="position"><span ref="cursor"></span><button on-click="onSetLanguage()" class="">{{ language || 'auto' }}</button></div>
  </div>

  <style>
    *,
    ::after,
    ::before {
      box-sizing: border-box;
    }

    .flex-col {
      flex-direction: column;
    }

    .editor-container {
      width: 100%;
      height: calc(100% - 30px);
    }

    .position {
      border-top: 1px solid rgba(229, 231, 235, 1);
      background-color: rgba(243, 244, 246, 0.4);
      padding: 0.25rem;
      font-size: 0.75rem;
      line-height: 1rem;
      text-align: right;
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      height: 30px;
    }

    .flex {
      display: flex;
    }

    .editor-area {
      position: relative;
      overflow: auto;
    }

    .expand {
      width: 100%;
      height: 100%;
    }

    .monospace {
      font-family: monospace;
      line-height: 1rem;
      font-size: 0.75rem;
      letter-spacing: 0px;
      padding: 0.5rem 0.25rem;
    }

    .line-numbers {
      counter-reset: line;
      text-align: right;
      opacity: 0.5;
      background-color: #f0f0f0;
      user-select: none;
      overflow: hidden;
    }

    .line-numbers span {
      display: block;
      counter-increment: line;
      padding-right: 0.5rem;
      color: #888;
    }

    .line-numbers span::before {
      content: counter(line);
    }

    .layer {
      position: absolute;
      top: 0px;
      right: 0px;
      left: 0px;
      bottom: 0px;
    }

    .preview {
      z-index: 2;
      white-space: pre;
      overflow: hidden;
    }

    .source {
      z-index: 3;
      caret-color: black;
      background: transparent;
      color: transparent;
      overflow: auto;
      white-space: nowrap;
      resize: none;
      border: none;
    }
  </style>

  <script setup="" src="./code-editor.mjs"></script>
</template>
