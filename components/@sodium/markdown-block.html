<template shadow-dom="open" component="markdown-block">
  <slot></slot>

  <script setup>
    import { onInit, getElement } from "@li3/web";
    import markdown from "https://markdown.jsfn.run/index.mjs";

    export default function () {
      const element = getElement();

      onInit(async function () {
        const source =
          (
            element.querySelector("pre") ||
            element.shadowRoot.querySelector("slot")
          ).innerHTML.trim() || "";

        if (!source) return;

        try {
          const html = await markdown(source);
          element.innerHTML = html || source;
        } catch (error) {
          console.error(error);
          element.innerHTML = source;
        }
      });
      
    }
  </script>
</template>
