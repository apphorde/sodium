<template shadow-dom="open">
  <code attr-lang="language">
    <pre ref="preview">
      <slot></slot>
    </pre>
  </code>

  <script setup>
    import { templateRef, defineProp, onInit } from "@li3/web";
    import "https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@10.1.2/build/highlight.min.js";

    const source = defineProp("source");
    const language = defineProp("language");
    const preview = templateRef(null);

    loadCss(
      "https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@10.1.2/build/styles/default.min.css",
    );

    onInit(function ({ element }) {
      const src = source.value || element.innerHTML.trim() || "";
      const language = language.value || "";
      preview.value.innerHTML =
        window.hljs?.highlight(language, src).value || src;
    });
  </script>
</template>
