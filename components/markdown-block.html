<template shadow-dom="open" component="markdown-block">
  <slot></slot>

  <script setup>
    import { onInit, getElement, defineProp, watch } from "@li3/web";
    import markdown from "https://markdown.jsfn.run/index.mjs";

    export default function () {
      const element = getElement();
      const src = defineProp("src");

      async function update(text) {
        try {
          element.innerHTML = text;
          const html = await markdown(text);
          element.innerHTML = html || text;
        } catch (error) {
          console.error(error);
          element.innerHTML = text;
        }
      }

      watch(src, (v) => v && update(v));

      onInit(async function () {
        const source =
          (
            element.querySelector("pre") ||
            element.shadowRoot.querySelector("slot")
          ).innerHTML.trim() || "";

        if (!source) return;
        
        update(source);
      });
    }
  </script>
</template>
